<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ZILFYGAMES</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', system-ui, sans-serif; }
    body {
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a10 100%);
      color: #f0f0f0; min-height:100vh; overflow:hidden;
    }
    .glow { box-shadow: 0 0 20px rgba(255,70,70,0.3); }
    .neon-text { text-shadow: 0 0 15px rgba(255,70,70,0.6); }
    button, input, textarea { outline:none; border:none; font-family: inherit; }
    input, textarea {
      background: rgba(255,255,255,0.05); color:white; padding:12px 16px;
      border-radius:12px; border:1px solid rgba(255,255,255,0.12);
      font-size:14px; transition:0.2s;
    }
    input:focus, textarea:focus { border-color: #ff4d4d; box-shadow: 0 0 15px rgba(255,70,70,0.25); }
    button {
      background: linear-gradient(135deg, #ff4d4d, #cc0000); color:white; font-weight:600;
      padding:10px 20px; border-radius:12px; cursor:pointer; font-size:14px;
      box-shadow: 0 4px 15px rgba(255,70,70,0.35); transition: all 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,70,70,0.5); }
    button.secondary { background: rgba(255,255,255,0.08); box-shadow: none; }
    button.secondary:hover { background: rgba(255,255,255,0.12); }
    .card {
      background: rgba(20,20,30,0.65); backdrop-filter: blur(20px); border-radius:16px;
      padding:20px; border:1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    #loginScreen, #app, #gameContainer2D, #gameContainer3D { width:100vw; height:100vh; }
    #loginScreen {
      display:flex; align-items:center; justify-content:center;
      background: radial-gradient(circle, #1a1a2e, #0a0a10);
    }
    .login-box {
      background: rgba(15,15,25,0.85); backdrop-filter: blur(30px); border-radius:24px;
      padding:45px; width:400px; border:1px solid rgba(255,70,70,0.25);
      box-shadow: 0 0 40px rgba(255,70,70,0.2);
    }
    .login-box h2 { color:#ff4d4d; margin-bottom:25px; font-size:32px; font-weight:700; }

    #app { display:none; flex-direction:column; }
    .topbar {
      height:60px; background: rgba(12,12,20,0.85); backdrop-filter: blur(20px);
      display:flex; align-items:center; padding:0 25px;
      border-bottom:1px solid rgba(255,70,70,0.3);
    }
    .logo { font-weight:800; font-size:22px; color:#ff4d4d; margin-right:35px; letter-spacing:1px; }
    .tabs { display:flex; gap:6px; }
    .tab {
      padding:8px 18px; border-radius:20px; cursor:pointer; font-weight:600;
      font-size:13px; color:#ccc; background:rgba(255,255,255,0.05); transition:0.2s;
    }
    .tab.active, .tab:hover { background:rgba(255,70,70,0.25); color:white; box-shadow: 0 0 12px rgba(255,70,70,0.3); }
    .userarea { margin-left:auto; display:flex; align-items:center; gap:14px; }
    #logoutBtn { background:transparent; border:1px solid rgba(255,255,255,0.2); padding:6px 14px; }

    .content { flex:1; display:flex; overflow:hidden; }
    #view-home { display:flex; }
    .sidebar { width:280px; background:rgba(15,15,25,0.7); backdrop-filter:blur(15px); border-right:1px solid rgba(255,70,70,0.2); padding:20px; overflow-y:auto; }
    .main { flex:1; padding:25px; overflow-y:auto; }

    .list-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
    .online-dot { width:10px; height:10px; border-radius:50%; background:#4caf50; margin-right:8px; }
    .offline-dot { background:#555; }

    /* Modal for profile */
    .modal {
      position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:300;
    }
    .modal-content {
      background: #1e1e2e; border-radius:20px; padding:30px; min-width:300px;
      border:1px solid rgba(255,70,70,0.3); box-shadow: 0 0 30px rgba(255,70,70,0.3);
    }

    /* Game overlays */
    #gameContainer2D, #gameContainer3D { position:fixed; top:0; left:0; z-index:200; display:none; background: #111118; }
    .game-hud { position:absolute; top:15px; left:15px; background:rgba(0,0,0,0.7); color:white; padding:8px 16px; border-radius:10px; z-index:10; }
    .leave-game-btn { position:absolute; top:15px; right:15px; z-index:10; background: rgba(255,70,70,0.8); border:none; color:white; padding:8px 16px; border-radius:8px; cursor:pointer; }
    .chat-container { position:absolute; bottom:80px; left:15px; width:300px; max-height:200px; background:rgba(0,0,0,0.7); border-radius:12px; padding:10px; display:flex; flex-direction:column; z-index:10; overflow-y:auto; font-size:13px; }
    .chat-message { margin:3px 0; }
    .chat-input-row { position:absolute; bottom:15px; left:15px; right:100px; display:flex; gap:10px; z-index:10; }
    .chat-input-row input { flex:1; background:rgba(0,0,0,0.8); color:white; border:1px solid rgba(255,255,255,0.2); padding:8px; border-radius:8px; }
    .build-panel { position:absolute; bottom:15px; right:15px; display:flex; gap:8px; z-index:10; background:rgba(0,0,0,0.8); padding:10px; border-radius:12px; }
    .color-swatch { width:28px; height:28px; border-radius:8px; cursor:pointer; border:2px solid transparent; }
    .color-swatch.selected { border-color:#ff4d4d; box-shadow:0 0 10px #ff4d4d; }
  </style>
</head>
<body>
  <!-- Login screen -->
  <div id="loginScreen">
    <div class="login-box">
      <h2 class="neon-text">ZILFYGAMES</h2>
      <input id="loginUser" placeholder="Username" autocomplete="off">
      <input id="loginPass" type="password" placeholder="Password">
      <div id="loginError" style="color:#ff6b6b; font-size:13px; min-height:20px; margin:5px 0;"></div>
      <button id="loginBtn" style="width:100%; margin-top:12px;">LAUNCH</button>
      <p style="text-align:center; margin-top:18px; font-size:13px; color:#aaa;">
        <span id="toggleLink" style="cursor:pointer; color:#ff4d4d;">No account? Sign up</span>
      </p>
    </div>
  </div>

  <!-- Main app -->
  <div id="app">
    <div class="topbar">
      <div class="logo neon-text">ZILFYGAMES</div>
      <div class="tabs">
        <div class="tab active" data-tab="home">🏠 Home</div>
        <div class="tab" data-tab="2d">🕹️ 2D Worlds</div>
        <div class="tab" data-tab="3d">🌍 3D Worlds</div>
        <div class="tab" data-tab="create">✨ Create</div>
        <div class="tab" data-tab="catalog">👕 Catalog</div>
      </div>
      <div class="userarea">
        <span id="displayName" style="font-weight:700;"></span>
        <button id="logoutBtn" class="secondary">Exit</button>
      </div>
    </div>

    <div class="content">
      <!-- Home Tab with friends and friend requests -->
      <div class="tab-view" id="view-home" style="display:flex; width:100%;">
        <div class="sidebar">
          <h3 style="margin-bottom:12px;">Search Users</h3>
          <input id="friendSearch" placeholder="Username...">
          <div id="searchResults" style="margin-top:12px;"></div>
          <h3 style="margin-top:20px;">Friend Requests</h3>
          <div id="friendRequestsList"></div>
        </div>
        <div class="main">
          <h2>Friends</h2>
          <div id="friendsList"></div>
        </div>
      </div>

      <!-- 2D Worlds Tab -->
      <div class="tab-view" id="view-2d" style="display:none; padding:25px; width:100%; overflow-y:auto;">
        <h2>Starter 2D Games</h2>
        <div id="starter2DList" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:15px; margin-bottom:30px;"></div>
        <h2>Active 2D Lobbies</h2>
        <div id="2dRoomsList"></div>
        <button class="secondary" onclick="socket.emit('joinRoom','lobby_2d')" style="margin-top:15px;">Public 2D Lobby</button>
      </div>

      <!-- 3D Worlds Tab -->
      <div class="tab-view" id="view-3d" style="display:none; padding:25px; width:100%;">
        <h2>Active 3D Lobbies</h2>
        <div id="3dRoomsList"></div>
        <button class="secondary" onclick="socket.emit('joinRoom','lobby_3d')" style="margin-top:15px;">Public 3D Lobby</button>
      </div>

      <!-- Create Tab -->
      <div class="tab-view" id="view-create" style="display:none; padding:25px; width:100%;">
        <div class="card">
          <h3>Create New Game</h3>
          <input id="newGameName" placeholder="Game Name" style="width:100%; margin:12px 0;">
          <div style="display:flex; gap:15px; margin:12px 0;">
            <label><input type="radio" name="gameType" value="3d" checked> 3D World</label>
            <label><input type="radio" name="gameType" value="2d"> 2D World</label>
          </div>
          <textarea id="newGameCode" rows="4" placeholder="Optional Lua code..." style="width:100%; margin:12px 0;"></textarea>
          <button id="createGameBtn">Publish Game</button>
        </div>
        <div class="card" style="margin-top:20px;">
          <h3>Your Published Games</h3>
          <div id="myGamesList"></div>
        </div>
      </div>

      <!-- Catalog Tab -->
      <div class="tab-view" id="view-catalog" style="display:none; padding:25px; width:100%;">
        <h2>Avatar Catalog</h2>
        <div id="catalogGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(110px,1fr)); gap:12px;"></div>
        <h2 style="margin-top:25px;">Preview</h2>
        <button id="resetAvatarBtn" class="secondary">Unequip All</button>
      </div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="profileModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2 id="profileUsername"></h2>
      <p id="profileStatus"></p>
      <p id="profileFriendsCount"></p>
      <button id="closeProfileBtn">Close</button>
    </div>
  </div>

  <!-- 2D Game Overlay -->
  <div id="gameContainer2D">
    <div class="game-hud" id="hud2D">Players: 0</div>
    <button class="leave-game-btn" id="leaveGame2D">Leave Game</button>
    <div class="chat-container" id="chatDisplay2D"></div>
    <div class="chat-input-row">
      <input id="chatInput2D" placeholder="Chat..." autocomplete="off">
      <button id="sendChat2D">Send</button>
    </div>
    <div class="build-panel" id="buildPanel2D">
      <div class="color-swatch" style="background:red" data-color="red"></div>
      <div class="color-swatch" style="background:blue" data-color="blue"></div>
      <div class="color-swatch" style="background:green" data-color="green"></div>
      <button id="toggleBuild2D" class="secondary" style="margin-left:8px;">Build</button>
    </div>
    <canvas id="gameCanvas2D" width="800" height="600" style="width:100%; height:100%;"></canvas>
  </div>

  <!-- 3D Game Overlay -->
  <div id="gameContainer3D">
    <div class="game-hud" id="hud3D">Players: 0</div>
    <button class="leave-game-btn" id="leaveGame3D">Leave Game</button>
    <div class="chat-container" id="chatDisplay3D"></div>
    <div class="chat-input-row">
      <input id="chatInput3D" placeholder="Chat..." autocomplete="off">
      <button id="sendChat3D">Send</button>
    </div>
    <div class="build-panel" id="buildPanel3D">
      <div class="color-swatch" style="background:#ff4d4d" data-color="#ff4d4d"></div>
      <div class="color-swatch" style="background:#4d4dff" data-color="#4d4dff"></div>
      <div class="color-swatch" style="background:#4dff4d" data-color="#4dff4d"></div>
      <button id="toggleBuild3D" class="secondary" style="margin-left:8px;">Build</button>
    </div>
    <div id="threeContainer"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ---------- GLOBAL STATE ----------
    const socket = io();
    let currentUser = null, isLogin = true;
    let allItems = [], equipped = [];
    let allGames = [];
    let activeTab = 'home';
    let current2DRoom = null, current3DRoom = null;
    let players2D = {}, players3D = {};
    let tileData2D = [], blockData3D = [];
    let keys = {};
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    // DOM elements
    const loginScreen = document.getElementById('loginScreen');
    const app = document.getElementById('app');
    const loginUser = document.getElementById('loginUser'), loginPass = document.getElementById('loginPass');
    const loginBtn = document.getElementById('loginBtn'), loginError = document.getElementById('loginError');
    const toggleLink = document.getElementById('toggleLink');
    const tabs = document.querySelectorAll('.tab');
    const displayName = document.getElementById('displayName');
    const logoutBtn = document.getElementById('logoutBtn');
    const gameContainer2D = document.getElementById('gameContainer2D');
    const gameContainer3D = document.getElementById('gameContainer3D');
    const gameCanvas2D = document.getElementById('gameCanvas2D');
    const ctx2D = gameCanvas2D.getContext('2d');
    const leaveGame2D = document.getElementById('leaveGame2D');
    const leaveGame3D = document.getElementById('leaveGame3D');
    const toggleBuild2D = document.getElementById('toggleBuild2D');
    const toggleBuild3D = document.getElementById('toggleBuild3D');
    const chatDisplay2D = document.getElementById('chatDisplay2D'), chatInput2D = document.getElementById('chatInput2D'), sendChat2D = document.getElementById('sendChat2D');
    const chatDisplay3D = document.getElementById('chatDisplay3D'), chatInput3D = document.getElementById('chatInput3D'), sendChat3D = document.getElementById('sendChat3D');
    const friendRequestsList = document.getElementById('friendRequestsList');
    const profileModal = document.getElementById('profileModal');
    const closeProfileBtn = document.getElementById('closeProfileBtn');

    let buildMode2D = false, buildMode3D = false;
    let selectedColor2D = 'red', selectedColor3D = '#ff4d4d';
    let friendRequests = [];

    // ---------- AUTH ----------
    loginBtn.addEventListener('click', () => {
      const u = loginUser.value.trim(), p = loginPass.value.trim();
      if(!u||!p) return loginError.textContent = 'Fill all fields';
      socket.emit(isLogin?'login':'signup', {username:u, password:p});
    });
    toggleLink.addEventListener('click', () => {
      isLogin = !isLogin;
      loginBtn.textContent = isLogin?'LAUNCH':'CREATE ACCOUNT';
      toggleLink.textContent = isLogin?'No account? Sign up':'Have an account? Log in';
    });
    socket.on('loginError', m => loginError.textContent = m);
    socket.on('signupError', m => loginError.textContent = m);

    socket.on('loginSuccess', data => {
      currentUser = data.username;
      displayName.textContent = currentUser;
      loginScreen.style.display = 'none';
      app.style.display = 'flex';
      allItems = data.catalogItems;
      equipped = data.equipped || [];
      allGames = data.games || [];
      friendRequests = data.friendRequests || [];
      renderFriends(data.friends);
      renderFriendRequests();
      render2DWorlds(data.activeRooms, data.starter2D);
      render3DWorlds(data.activeRooms);
      renderCatalog();
      renderMyGames();
      showTab('home');
      window.currentStarter2D = data.starter2D;
    });

    logoutBtn.addEventListener('click', () => { socket.disconnect(); location.reload(); });

    tabs.forEach(t => t.addEventListener('click', () => showTab(t.dataset.tab)));
    function showTab(name) {
      tabs.forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
      document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
      document.getElementById(`view-${name}`).style.display = (name==='home'?'flex':'block');
      activeTab = name;
      if(name==='create') renderMyGames();
      if(name==='catalog') renderCatalog();
    }

    // ---------- FRIENDS & REQUESTS ----------
    const friendSearch = document.getElementById('friendSearch'), searchResults = document.getElementById('searchResults');
    let friendsArr = [];
    friendSearch.addEventListener('input', () => {
      const q = friendSearch.value.trim();
      if(q.length<1){ searchResults.innerHTML=''; return; }
      socket.emit('searchUser', q);
    });
    socket.on('searchResults', r => {
      searchResults.innerHTML = r.map(u => `
        <div class="list-item">
          <span>${u}</span>
          <button class="secondary" onclick="sendRequest('${u}')">Add Friend</button>
          <button class="secondary" onclick="viewProfile('${u}')">Profile</button>
        </div>`).join('');
    });
    window.sendRequest = (to) => socket.emit('sendFriendRequest', to);
    window.viewProfile = (username) => {
      socket.emit('getProfile', username);
    };

    socket.on('friendRequestReceived', ({ from }) => {
      // Append to local array if not already present
      if (!friendRequests.find(r => r.from === from)) {
        friendRequests.push({ from, timestamp: Date.now() });
        renderFriendRequests();
      }
    });
    socket.on('friendAdded', name => {
      if (!friendsArr.includes(name)) friendsArr.push(name);
      renderFriends(friendsArr);
    });

    function renderFriendRequests() {
      friendRequestsList.innerHTML = '<h4>Pending Requests</h4>';
      if (friendRequests.length === 0) {
        friendRequestsList.innerHTML += '<p style="color:#aaa;">No requests.</p>';
      } else {
        friendRequests.forEach(req => {
          friendRequestsList.innerHTML += `
            <div class="list-item">
              <span>${req.from}</span>
              <div>
                <button onclick="acceptRequest('${req.from}')">Accept</button>
                <button class="secondary" onclick="declineRequest('${req.from}')">Decline</button>
              </div>
            </div>`;
        });
      }
    }
    window.acceptRequest = (from) => socket.emit('acceptFriendRequest', from);
    window.declineRequest = (from) => socket.emit('declineFriendRequest', from);
    socket.on('friendRequestsUpdate', newReqs => {
      friendRequests = newReqs;
      renderFriendRequests();
    });

    function renderFriends(arr) {
      friendsArr = arr;
      document.getElementById('friendsList').innerHTML = arr.length ? arr.map(f => `
        <div class="list-item"><span><span class="online-dot"></span>${f}</span><button class="secondary" onclick="viewProfile('${f}')">Profile</button></div>`).join('') : '<p>No friends yet.</p>';
    }

    // Profile Modal
    closeProfileBtn.addEventListener('click', () => profileModal.style.display = 'none');
    socket.on('profileData', data => {
      document.getElementById('profileUsername').textContent = data.username;
      document.getElementById('profileStatus').textContent = data.online ? 'Online' : 'Offline';
      document.getElementById('profileFriendsCount').textContent = `Friends: ${data.friendCount}`;
      profileModal.style.display = 'flex';
    });

    // ---------- ROOMS ----------
    function render2DWorlds(rooms, starter) {
      const starterDiv = document.getElementById('starter2DList');
      starterDiv.innerHTML = starter.map(g => `
        <div class="card" style="padding:15px; text-align:center;">
          <h4>${g.name}</h4>
          <p style="color:#aaa; font-size:13px; margin:6px 0;">${g.description}</p>
          <button onclick="socket.emit('joinRoom','starter_${g.id}')">Play</button>
        </div>`).join('');

      const twoD = rooms.filter(r => r.type==='2d');
      document.getElementById('2dRoomsList').innerHTML = twoD.map(r => `
        <div class="list-item"><span>${r.name} (${r.playerCount} players)</span><button onclick="socket.emit('joinRoom','${r.name}')">Join</button></div>
      `).join('');
    }
    function render3DWorlds(rooms) {
      const threeD = rooms.filter(r => r.type==='3d');
      document.getElementById('3dRoomsList').innerHTML = threeD.map(r => `
        <div class="list-item"><span>${r.name} (${r.playerCount} players)</span><button onclick="socket.emit('joinRoom','${r.name}')">Join</button></div>
      `).join('');
    }
    socket.on('activeRoomsUpdate', rooms => {
      render2DWorlds(rooms, window.currentStarter2D);
      render3DWorlds(rooms);
    });

    // ---------- CREATE GAME ----------
    const newGameName = document.getElementById('newGameName'), newGameCode = document.getElementById('newGameCode');
    const createGameBtn = document.getElementById('createGameBtn');
    const myGamesList = document.getElementById('myGamesList');
    createGameBtn.addEventListener('click', () => {
      const name = newGameName.value.trim(), code = newGameCode.value.trim();
      const type = document.querySelector('input[name="gameType"]:checked').value;
      if(!name) return alert('Name required');
      socket.emit('createGame', {name, code, type});
      newGameName.value=''; newGameCode.value='';
    });
    socket.on('newGame', game => { allGames.push(game); renderMyGames(); });
    socket.on('gameDeleted', id => { allGames = allGames.filter(g=>g.id!==id); renderMyGames(); });
    function renderMyGames() {
      const own = allGames.filter(g => g.creator === currentUser);
      myGamesList.innerHTML = own.length ? own.map(g => `
        <div class="list-item"><span><strong>${g.name}</strong> (${g.type})</span>
        <div><button onclick="hostGame(${g.id})">Host</button><button class="secondary" onclick="deleteGame(${g.id})">Del</button></div></div>
      `).join('') : '<p>No games yet.</p>';
    }
    window.hostGame = id => socket.emit('hostGame', id);
    window.deleteGame = id => socket.emit('deleteGame', id);

    // ---------- CATALOG ----------
    const catalogGrid = document.getElementById('catalogGrid');
    function renderCatalog() {
      catalogGrid.innerHTML = allItems.map(item => `
        <div style="background:rgba(255,255,255,0.05); border-radius:12px; padding:12px; text-align:center; cursor:pointer; border:${equipped.includes(item.id)?'2px solid #ff4d4d':'2px solid transparent'}" onclick="toggleItem('${item.id}')">
          <div style="font-size:26px;">${item.img||'⬛'}</div>
          <div style="font-size:13px; margin-top:6px;">${item.name}</div>
        </div>`).join('');
    }
    window.toggleItem = id => { equipped.includes(id) ? socket.emit('unequipItem', id) : socket.emit('equipItem', id); };
    socket.on('equippedUpdate', eq => { equipped = eq; renderCatalog(); });
    document.getElementById('resetAvatarBtn').addEventListener('click', () => equipped.forEach(id => socket.emit('unequipItem', id)));

    // ---------- 2D GAME LOOP ----------
    socket.on('roomJoined', data => {
      if(data.type === '2d') {
        current2DRoom = data.roomName;
        players2D = {};
        data.players.forEach(p => players2D[p.id] = p);
        tileData2D = data.tileData || [];
        gameContainer2D.style.display = 'block';
        gameContainer3D.style.display = 'none';
        document.getElementById('hud2D').textContent = 'Players: 0';
        chatDisplay2D.innerHTML = '';
        gameLoop2D();
      } else if(data.type === '3d') {
        start3DGame(data);
      }
    });
    socket.on('playerJoined', p => {
      if(current2DRoom) players2D[p.id] = p;
      else if(current3DRoom) add3DPlayer(p);
    });
    socket.on('playerMoved2D', ({id,x,y,dir}) => { if(players2D[id]) Object.assign(players2D[id],{x,y,dir}); });
    socket.on('playerLeft', id => { delete players2D[id]; if(current3DRoom) remove3DPlayer(id); });
    socket.on('tilePlaced', tile => tileData2D.push(tile));
    socket.on('tileRemoved', tileId => { tileData2D = tileData2D.filter(t => t.id !== tileId); });
    socket.on('chatMessage', msg => {
      const display = current2DRoom ? chatDisplay2D : chatDisplay3D;
      if(display) {
        display.innerHTML += `<div class="chat-message"><b>${msg.sender}:</b> ${msg.message}</div>`;
        display.scrollTop = display.scrollHeight;
      }
    });

    leaveGame2D.addEventListener('click', () => { socket.emit('leaveRoom'); current2DRoom=null; gameContainer2D.style.display='none'; });
    toggleBuild2D.addEventListener('click', () => { buildMode2D = !buildMode2D; toggleBuild2D.textContent = buildMode2D ? 'Build: ON' : 'Build'; });
    document.querySelectorAll('#buildPanel2D .color-swatch').forEach(sw => {
      sw.addEventListener('click', () => { selectedColor2D = sw.dataset.color; document.querySelectorAll('#buildPanel2D .color-swatch').forEach(s=>s.classList.remove('selected')); sw.classList.add('selected'); });
    });
    gameCanvas2D.addEventListener('click', e => {
      if(!buildMode2D || !current2DRoom) return;
      const rect = gameCanvas2D.getBoundingClientRect();
      const scaleX = 800 / rect.width, scaleY = 600 / rect.height;
      const x = (e.clientX - rect.left) * scaleX, y = (e.clientY - rect.top) * scaleY;
      socket.emit('placeTile', { position: {x,y}, color: selectedColor2D, width:20, height:20 });
    });
    sendChat2D.addEventListener('click', () => {
      const msg = chatInput2D.value.trim();
      if(msg && current2DRoom) { socket.emit('chatMessage', { message: msg, roomName: current2DRoom }); chatInput2D.value = ''; }
    });
    chatInput2D.addEventListener('keypress', e => { if(e.key==='Enter') sendChat2D.click(); });

    function gameLoop2D() {
      if(!current2DRoom) return;
      const me = Object.values(players2D).find(p => p.id === socket.id);
      if(me) {
        if(keys['ArrowLeft']) me.x -= 3;
        if(keys['ArrowRight']) me.x += 3;
        if(keys['ArrowUp']) me.y -= 3;
        if(keys['ArrowDown']) me.y += 3;
        socket.emit('move2D', { x: me.x, y: me.y, dir: 'down' });
      }
      ctx2D.clearRect(0,0,800,600);
      tileData2D.forEach(t => { ctx2D.fillStyle = t.color; ctx2D.fillRect(t.position.x, t.position.y, t.width, t.height); });
      Object.values(players2D).forEach(p => {
        ctx2D.fillStyle = p.avatar.bodyColour; ctx2D.fillRect(p.x-12, p.y-12, 24, 24);
        ctx2D.fillStyle='#ffdbac'; ctx2D.fillRect(p.x-8, p.y-22, 16, 16);
        ctx2D.fillStyle='white'; ctx2D.font='10px sans-serif'; ctx2D.fillText(p.username, p.x-15, p.y-16);
      });
      document.getElementById('hud2D').textContent = `Players: ${Object.keys(players2D).length}`;
      requestAnimationFrame(gameLoop2D);
    }

    // ---------- 3D GAME ----------
    let scene3D, camera3D, renderer3D, me3D;
    let playerMeshes3D = {}, blockMeshes3D = [];

    function init3DScene() {
      scene3D = new THREE.Scene();
      scene3D.background = new THREE.Color(0x1a1a2e);
      camera3D = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
      renderer3D = new THREE.WebGLRenderer({ antialias: true });
      renderer3D.setSize(window.innerWidth, window.innerHeight);
      renderer3D.shadowMap.enabled = true;
      document.getElementById('threeContainer').appendChild(renderer3D.domElement);
      const ambient = new THREE.AmbientLight(0x404080);
      scene3D.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(10,20,10);
      dirLight.castShadow = true;
      scene3D.add(dirLight);
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshPhongMaterial({ color: 0x333344 }));
      ground.rotation.x = -Math.PI/2;
      ground.receiveShadow = true;
      scene3D.add(ground);
    }

    function create3DPlayerMesh(playerData) {
      const group = new THREE.Group();
      const bodyColor = playerData.avatar.bodyColour;

      // Head (blocky)
      const headGeo = new THREE.BoxGeometry(0.8,0.8,0.8);
      const headMat = new THREE.MeshPhongMaterial({ color: 0xffdbac });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.y = 0.75;
      head.castShadow = true; head.receiveShadow = true;
      group.add(head);

      // Face decal
      if(playerData.avatar.face) {
        const faceCanvas = document.createElement('canvas');
        faceCanvas.width=64; faceCanvas.height=64;
        const fctx = faceCanvas.getContext('2d');
        fctx.fillStyle = '#ffdbac'; fctx.fillRect(0,0,64,64);
        fctx.fillStyle = 'black'; fctx.font = '40px sans-serif'; fctx.fillText(playerData.avatar.face.img,8,48);
        const faceTexture = new THREE.CanvasTexture(faceCanvas);
        const facePlane = new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.5), new THREE.MeshBasicMaterial({ map: faceTexture, transparent: true }));
        facePlane.position.set(0,0.75,0.41);
        group.add(facePlane);
      }

      // Hat
      if(playerData.avatar.hat) {
        const hatGeo = new THREE.BoxGeometry(0.9,0.2,0.9);
        const hatMat = new THREE.MeshPhongMaterial({ color: playerData.avatar.hat.colour });
        const hat = new THREE.Mesh(hatGeo, hatMat);
        hat.position.y = 1.15;
        hat.castShadow = true;
        group.add(hat);
      }

      // Torso
      const torsoGeo = new THREE.BoxGeometry(1, 1.2, 0.6);
      const torsoMat = new THREE.MeshPhongMaterial({ color: bodyColor });
      const torso = new THREE.Mesh(torsoGeo, torsoMat);
      torso.position.y = 0;  // centered
      torso.castShadow = true; torso.receiveShadow = true;
      group.add(torso);

      // Arms
      const armGeo = new THREE.BoxGeometry(0.3, 0.8, 0.3);
      const armMat = new THREE.MeshPhongMaterial({ color: bodyColor });
      const leftArm = new THREE.Mesh(armGeo, armMat);
      leftArm.position.set(-0.65, -0.1, 0);
      group.add(leftArm);
      const rightArm = new THREE.Mesh(armGeo, armMat);
      rightArm.position.set(0.65, -0.1, 0);
      group.add(rightArm);

      // Legs
      const legGeo = new THREE.BoxGeometry(0.35, 0.8, 0.35);
      const legMat = new THREE.MeshPhongMaterial({ color: bodyColor });
      const leftLeg = new THREE.Mesh(legGeo, legMat);
      leftLeg.position.set(-0.25, -1.0, 0);
      group.add(leftLeg);
      const rightLeg = new THREE.Mesh(legGeo, legMat);
      rightLeg.position.set(0.25, -1.0, 0);
      group.add(rightLeg);

      group.position.set(playerData.x, playerData.y||0, playerData.z);
      return group;
    }

    function start3DGame(data) {
      current3DRoom = data.roomName;
      gameContainer3D.style.display = 'block';
      gameContainer2D.style.display = 'none';
      if(!scene3D) init3DScene();
      // Clear previous players/blocks
      while(scene3D.children.length > 4) scene3D.remove(scene3D.children[4]);
      playerMeshes3D = {}; blockMeshes3D = [];
      data.players.forEach(p => add3DPlayer(p));
      data.blockData.forEach(b => placeBlockMesh(b));
      gameLoop3D();
    }
    function add3DPlayer(p) {
      const mesh = create3DPlayerMesh({...p});
      scene3D.add(mesh);
      playerMeshes3D[p.id] = mesh;
      if(p.id === socket.id) me3D = mesh;
    }
    function remove3DPlayer(id) {
      if(playerMeshes3D[id]) { scene3D.remove(playerMeshes3D[id]); delete playerMeshes3D[id]; }
    }
    function placeBlockMesh(block) {
      const geo = new THREE.BoxGeometry(1,1,1);
      const mat = new THREE.MeshPhongMaterial({ color: block.color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(block.position.x, block.position.y, block.position.z);
      mesh.castShadow = true; mesh.receiveShadow = true;
      mesh.userData.blockId = block.id;
      scene3D.add(mesh);
      blockMeshes3D.push(mesh);
    }
    socket.on('playerMoved3D', ({id,x,y,z,dir}) => {
      if(playerMeshes3D[id]) playerMeshes3D[id].position.set(x,y,z);
    });
    socket.on('blockPlaced', b => placeBlockMesh(b));
    socket.on('blockRemoved', id => {
      const mesh = blockMeshes3D.find(m => m.userData.blockId === id);
      if(mesh) { scene3D.remove(mesh); blockMeshes3D = blockMeshes3D.filter(m => m !== mesh); }
    });
    socket.on('avatarUpdate', ({id, avatar}) => {
      if(playerMeshes3D[id]) {
        remove3DPlayer(id);
        const pData = { id, x:playerMeshes3D[id]?.position?.x||0, y:playerMeshes3D[id]?.position?.y||0, z:playerMeshes3D[id]?.position?.z||0, avatar };
        add3DPlayer(pData);
      }
    });

    leaveGame3D.addEventListener('click', () => { socket.emit('leaveRoom'); current3DRoom=null; gameContainer3D.style.display='none'; });
    toggleBuild3D.addEventListener('click', () => { buildMode3D = !buildMode3D; toggleBuild3D.textContent = buildMode3D ? 'Build: ON' : 'Build'; });
    document.querySelectorAll('#buildPanel3D .color-swatch').forEach(sw => {
      sw.addEventListener('click', () => { selectedColor3D = sw.dataset.color; document.querySelectorAll('#buildPanel3D .color-swatch').forEach(s=>s.classList.remove('selected')); sw.classList.add('selected'); });
    });

    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    window.addEventListener('click', e => {
      if(!buildMode3D || !current3DRoom) return;
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera3D);
      const intersects = raycaster.intersectObjects(scene3D.children, true);
      if(intersects.length > 0) {
        const point = intersects[0].point;
        socket.emit('placeBlock', { position: {x:Math.round(point.x), y:Math.round(point.y), z:Math.round(point.z)}, color: selectedColor3D, type:'cube' });
      }
    });
    sendChat3D.addEventListener('click', () => {
      const msg = chatInput3D.value.trim();
      if(msg && current3DRoom) { socket.emit('chatMessage', { message: msg, roomName: current3DRoom }); chatInput3D.value = ''; }
    });
    chatInput3D.addEventListener('keypress', e => { if(e.key==='Enter') sendChat3D.click(); });

    function gameLoop3D() {
      if(!current3DRoom) return;
      if(me3D) {
        if(keys['ArrowLeft']) me3D.position.x -= 0.15;
        if(keys['ArrowRight']) me3D.position.x += 0.15;
        if(keys['ArrowUp']) me3D.position.z -= 0.15;
        if(keys['ArrowDown']) me3D.position.z += 0.15;
        socket.emit('move3D', { x:me3D.position.x, y:me3D.position.y, z:me3D.position.z, dir:'forward' });
        camera3D.position.set(me3D.position.x, me3D.position.y+6, me3D.position.z+8);
        camera3D.lookAt(me3D.position.x, me3D.position.y, me3D.position.z);
      }
      renderer3D.render(scene3D, camera3D);
      document.getElementById('hud3D').textContent = `Players: ${Object.keys(playerMeshes3D).length}`;
      requestAnimationFrame(gameLoop3D);
    }

    window.addEventListener('resize', () => {
      if(gameContainer3D.style.display === 'block' && camera3D) {
        camera3D.aspect = window.innerWidth/window.innerHeight;
        camera3D.updateProjectionMatrix();
        renderer3D.setSize(window.innerWidth, window.innerHeight);
      }
    });
  </script>
</body>
</html>
